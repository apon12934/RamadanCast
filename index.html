<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RmadanCast — Sehri & Iftar Countdown Timer & Voice Announcer</title>
  <meta name="description" content="RmadanCast is a premium Sehri and Iftar countdown timer and voice announcer for Ramadan 2026. Get accurate times for Dhaka with voice alerts in English and Bangla." />
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0c0a1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <!-- Favicons and app icon -->
  <link rel="apple-touch-icon" href="/logo/RmadanCast%20-%20circular.svg?v=2" />
  <link rel="icon" type="image/svg+xml" href="/logo/RmadanCast%20-%20circular.svg?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Anek+Bangla:wght@100..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="min-h-screen overflow-x-hidden font-sans antialiased text-white relative">

  <!-- Geometric Pattern Background -->
  <div class="geometric-bg" aria-hidden="true"></div>

  <!-- Animated gradient orbs -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <!-- Main Container -->
  <div class="relative z-10 flex flex-col items-center justify-center min-h-[100dvh] px-4 py-6 sm:px-6 lg:px-8">

    <!-- Header -->
    <header class="text-center mb-4 sm:mb-10 w-full max-w-lg">
      <!-- Logo -->
      <div class="flex justify-center mb-4">
        <img src="/logo/RmadanCast.svg" alt="RmadanCast" class="w-16 h-16 sm:w-20 sm:h-20 drop-shadow-[0_0_20px_rgba(249,115,22,0.4)]" />
      </div>
      <div class="relative inline-block">
        <!-- Absolutely positioned icon so it doesn't shift the centered text -->
        <div class="crescent-icon absolute right-full mr-4 top-1/2 -translate-y-1/2" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="36" height="36" fill="none">
            <path d="M20 2a18 18 0 1 0 0 36 14 14 0 0 1 0-36z" fill="url(#crescentGrad)" />
            <defs>
              <linearGradient id="crescentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" class="crescent-stop-1" />
                <stop offset="100%" class="crescent-stop-2" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="text-3xl sm:text-4xl font-outfit font-bold tracking-tight text-transparent" id="mainTitle">
          RamadanCast
        </h1>
      </div>
      <p class="text-sm sm:text-base text-white/50 font-light tracking-wide mt-1" id="subtitle">Ramadan 2026 • Dhaka</p>
    </header>

      <!-- Main Card -->
    <main class="glass-card w-full max-w-lg sm:max-w-xl p-5 sm:p-10 mb-4 sm:mb-8">
      
      <!-- Date & Sehri Info -->
      <div class="flex flex-col sm:flex-row items-center justify-between gap-2 sm:gap-3 mb-4 sm:mb-6 pb-4 sm:pb-6 border-b border-white/10">
        <div class="text-center sm:text-left">
          <p class="text-[10px] sm:text-xs uppercase tracking-widest text-white/40 mb-1" id="dateLabel">Today's Date</p>
          <p class="text-base sm:text-lg font-semibold text-white/90" id="currentDate">—</p>
        </div>
        <div class="text-center sm:text-right">
          <p class="text-[10px] sm:text-xs uppercase tracking-widest text-white/40 mb-1" id="sehriLabel">Sehri Ends At</p>
          <p class="text-base sm:text-lg font-semibold text-emerald-400" id="sehriTime">—</p>
        </div>
      </div>

      <!-- Countdown Timer -->
      <div class="text-center mb-4 sm:mb-8">
        <p class="text-[10px] sm:text-xs uppercase tracking-widest text-white/40 mb-2 sm:mb-4" id="countdownLabel">Time Remaining</p>
        <div id="countdownDisplay" class="countdown-digits select-none">
          <span id="hours" class="countdown-segment">00</span>
          <span class="countdown-colon">:</span>
          <span id="minutes" class="countdown-segment">00</span>
          <span class="countdown-colon">:</span>
          <span id="seconds" class="countdown-segment">00</span>
        </div>
        <p class="text-xs sm:text-sm text-white/30 mt-2 sm:mt-3 empty:hidden" id="statusMessage"></p>
      </div>

      <!-- Progress Bar -->
      <div class="w-full h-1.5 rounded-full bg-white/5 mb-6 sm:mb-8 overflow-hidden">
        <div id="progressBar" class="h-full rounded-full transition-all duration-1000 ease-linear" style="width: 0%"></div>
      </div>

      <!-- Controls -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <!-- Language Toggle -->
        <label class="control-card cursor-pointer" id="languageControl" for="langToggle">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Language</p>
              <p class="text-sm font-medium text-white/80" id="currentLangLabel">বাংলা</p>
            </div>
            <span class="toggle-switch">
              <input type="checkbox" id="langToggle" checked />
              <span class="toggle-slider">
                <span class="toggle-label-left">EN</span>
                <span class="toggle-label-right">বাং</span>
              </span>
            </span>
          </div>
        </label>

        <!-- Voice Toggle -->
        <label class="control-card cursor-pointer" id="voiceControl" for="voiceToggle">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Voice</p>
              <p class="text-sm font-medium text-white/80" id="voiceStatusLabel">বন্ধ</p>
            </div>
            <span class="toggle-switch">
              <input type="checkbox" id="voiceToggle" />
              <span class="toggle-slider">
                <span class="toggle-label-left">
                  <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM12.293 7.293a1 1 0 011.414 0L15 8.586l1.293-1.293a1 1 0 111.414 1.414L16.414 10l1.293 1.293a1 1 0 01-1.414 1.414L15 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L13.586 10l-1.293-1.293a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                </span>
                <span class="toggle-label-right">
                  <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                </span>
              </span>
            </span>
          </div>
        </label>

        <!-- Phase View Toggle -->
        <button class="control-card flex items-center justify-between text-left hover:bg-white/10 transition-colors cursor-pointer group" id="phaseSwapBtn">
          <div>
            <p class="text-xs uppercase tracking-widest text-white/40 mb-1" id="phaseSwapLabel">View Phase</p>
            <p class="text-sm font-medium text-white/80" id="phaseCurrentLabel">Sehri</p>
          </div>
          <div class="w-8 h-8 rounded-full bg-white/5 group-hover:bg-white/10 flex items-center justify-center transition-colors">
            <svg class="w-4 h-4 text-white/60 group-hover:text-white/90" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h8M8 7l4-4m-4 4l4 4m0 6H8m8 0l-4 4m4-4l-4-4" /></svg>
          </div>
        </button>
      </div>
    </main>

    <!-- Footer -->
    <footer class="mt-4 sm:mt-8 text-center">
      <div class="flex flex-col items-center gap-4">
        <p class="text-white/40 text-sm tracking-wide bg-white/5 px-4 py-1.5 rounded-full border border-white/5" id="footerText">
          &copy; 2026 Alamin Islam Apon • RamadanCast
        </p>
        
        <!-- Install App Button (Hidden by default, shown by JS when installable) -->
        <button id="installBtn" class="hidden items-center justify-center gap-2 px-5 py-2 mt-2 bg-white/10 hover:bg-white/20 text-white/80 rounded-full text-sm font-medium transition-colors border border-white/10 w-fit">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
          Install as App
        </button>
        
        <!-- Social Media Links -->
        <div class="flex flex-wrap justify-center items-center gap-6">
          <!-- GitHub -->
          <a href="https://github.com/apon12934/RamadanCast" target="_blank" rel="noopener noreferrer" class="social-icon group">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24">
              <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" />
            </svg>
            <span class="sr-only">GitHub</span>
          </a>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
