<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RamadanCast — Sehri & Iftar Countdown Timer & Voice Announcer</title>
  <meta name="description" content="RamadanCast is a premium Sehri and Iftar countdown timer and voice announcer for Ramadan 2026. Get accurate times for Dhaka with voice alerts in English and Bangla." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&family=Anek+Bangla:wght@100..800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="min-h-screen overflow-x-hidden font-sans antialiased text-white relative">

  <!-- Geometric Pattern Background -->
  <div class="geometric-bg" aria-hidden="true"></div>

  <!-- Animated gradient orbs -->
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>
  <div class="orb orb-3" aria-hidden="true"></div>

  <!-- Main Container -->
  <div class="relative z-10 flex flex-col items-center justify-center min-h-screen px-4 py-8 sm:px-6 lg:px-8">

    <!-- Header -->
    <header class="text-center mb-6 sm:mb-10 w-full max-w-lg">
      <div class="relative inline-block">
        <!-- Absolutely positioned icon so it doesn't shift the centered text -->
        <div class="crescent-icon absolute right-full mr-4 top-1/2 -translate-y-1/2" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="36" height="36" fill="none">
            <path d="M20 2a18 18 0 1 0 0 36 14 14 0 0 1 0-36z" fill="url(#crescentGrad)" />
            <defs>
              <linearGradient id="crescentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" class="crescent-stop-1" />
                <stop offset="100%" class="crescent-stop-2" />
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="text-3xl sm:text-4xl font-outfit font-bold tracking-tight text-transparent" id="mainTitle">
          RamadanCast
        </h1>
      </div>
      <p class="text-sm sm:text-base text-white/50 font-light tracking-wide mt-1" id="subtitle">Ramadan 2026 • Dhaka</p>
    </header>

    <!-- Main Card -->
    <main class="glass-card w-full max-w-lg sm:max-w-xl p-6 sm:p-10 mb-6 sm:mb-8">
      
      <!-- User Engagement Trigger (Required for audio autoplay) -->
      <div id="audioUnlockOverlay" class="fixed inset-0 z-[100] cursor-pointer" aria-hidden="true"></div>

      <!-- Date & Sehri Info -->
      <div class="flex flex-col sm:flex-row items-center justify-between gap-3 mb-6 sm:mb-8 pb-5 sm:pb-6 border-b border-white/10">
        <div class="text-center sm:text-left">
          <p class="text-xs uppercase tracking-widest text-white/40 mb-1" id="dateLabel">Today's Date</p>
          <p class="text-base sm:text-lg font-semibold text-white/90" id="currentDate">—</p>
        </div>
        <div class="text-center sm:text-right">
          <p class="text-xs uppercase tracking-widest text-white/40 mb-1" id="sehriLabel">Sehri Ends At</p>
          <p class="text-base sm:text-lg font-semibold text-emerald-400" id="sehriTime">—</p>
        </div>
      </div>

      <!-- Countdown Timer -->
      <div class="text-center mb-6 sm:mb-8">
        <p class="text-xs uppercase tracking-widest text-white/40 mb-3 sm:mb-4" id="countdownLabel">Time Remaining</p>
        <div id="countdownDisplay" class="countdown-digits select-none">
          <span id="hours" class="countdown-segment">00</span>
          <span class="countdown-colon">:</span>
          <span id="minutes" class="countdown-segment">00</span>
          <span class="countdown-colon">:</span>
          <span id="seconds" class="countdown-segment">00</span>
        </div>
        <p class="text-sm text-white/30 mt-3 h-5" id="statusMessage"></p>
      </div>

      <!-- Progress Bar -->
      <div class="w-full h-1.5 rounded-full bg-white/5 mb-6 sm:mb-8 overflow-hidden">
        <div id="progressBar" class="h-full rounded-full transition-all duration-1000 ease-linear" style="width: 0%"></div>
      </div>

      <!-- Controls -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <!-- Language Toggle -->
        <div class="control-card" id="languageControl">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Language</p>
              <p class="text-sm font-medium text-white/80" id="currentLangLabel">English</p>
            </div>
            <label class="toggle-switch" for="langToggle">
              <input type="checkbox" id="langToggle" checked />
              <span class="toggle-slider">
                <span class="toggle-label-left">EN</span>
                <span class="toggle-label-right">বাং</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Voice Toggle -->
        <div class="control-card" id="voiceControl">
          <div class="flex items-center justify-between">
            <div>
              <p class="text-xs uppercase tracking-widest text-white/40 mb-1">Voice</p>
              <p class="text-sm font-medium text-white/80" id="voiceStatusLabel">Off</p>
            </div>
            <label class="toggle-switch" for="voiceToggle">
              <input type="checkbox" id="voiceToggle" checked />
              <span class="toggle-slider">
                <span class="toggle-label-left">
                  <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM12.293 7.293a1 1 0 011.414 0L15 8.586l1.293-1.293a1 1 0 111.414 1.414L16.414 10l1.293 1.293a1 1 0 01-1.414 1.414L15 11.414l-1.293 1.293a1 1 0 01-1.414-1.414L13.586 10l-1.293-1.293a1 1 0 010-1.414z" clip-rule="evenodd" /></svg>
                </span>
                <span class="toggle-label-right">
                  <svg viewBox="0 0 20 20" width="14" height="14" fill="currentColor"><path fill-rule="evenodd" d="M9.383 3.076A1 1 0 0110 4v12a1 1 0 01-1.707.707L4.586 13H2a1 1 0 01-1-1V8a1 1 0 011-1h2.586l3.707-3.707a1 1 0 011.09-.217zM14.657 2.929a1 1 0 011.414 0A9.972 9.972 0 0119 10a9.972 9.972 0 01-2.929 7.071 1 1 0 01-1.414-1.414A7.971 7.971 0 0017 10c0-2.21-.894-4.208-2.343-5.657a1 1 0 010-1.414zm-2.829 2.828a1 1 0 011.415 0A5.983 5.983 0 0115 10a5.984 5.984 0 01-1.757 4.243 1 1 0 01-1.415-1.415A3.984 3.984 0 0013 10a3.983 3.983 0 00-1.172-2.828 1 1 0 010-1.415z" clip-rule="evenodd" /></svg>
                </span>
              </span>
            </label>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="mt-8 text-center">
      <div class="flex flex-col items-center gap-4">
        <p class="text-white/40 text-sm tracking-wide bg-white/5 px-4 py-1.5 rounded-full border border-white/5" id="footerText">
          &copy; 2026 Alamin Islam Apon • RamadanCast
        </p>
        
        <!-- Social Media Links -->
        <div class="flex items-center gap-6">
          <!-- Facebook -->
          <a href="https://facebook.com/apon.xox" target="_blank" rel="noopener noreferrer" class="social-icon group">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24">
              <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.099 4.415 23.094 10.125 24v-8.442H7.078v-3.485h3.047v-2.655c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.485h-2.796V24C19.585 23.094 24 18.099 24 12.073z"/>
            </svg>
            <span class="sr-only">Facebook</span>
          </a>
          
          <!-- Instagram -->
          <a href="https://instagram.com/apon.xox" target="_blank" rel="noopener noreferrer" class="social-icon group">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 0C8.74 0 8.333.015 7.053.072 5.775.132 4.905.333 4.14.63c-.789.306-1.459.717-2.126 1.384S.935 3.35.63 4.14C.333 4.905.131 5.775.072 7.053.012 8.333 0 8.74 0 12s.015 3.667.072 4.947c.06 1.277.261 2.148.558 2.913.306.788.717 1.459 1.384 2.126.667.666 1.336 1.079 2.126 1.384.766.296 1.636.499 2.913.558C8.333 23.988 8.74 24 12 24s3.667-.015 4.947-.072c1.277-.06 2.148-.262 2.913-.558.788-.306 1.459-.718 2.126-1.384.666-.667 1.079-1.335 1.384-2.126.296-.765.499-1.636.558-2.913.06-1.28.072-1.687.072-4.947s-.015-3.667-.072-4.947c-.06-1.277-.262-2.149-.558-2.913-.306-.789-.718-1.459-1.384-2.126C21.319 1.347 20.651.935 19.86.63c-.765-.297-1.636-.499-2.913-.558C15.667.012 15.26 0 12 0zm0 2.16c3.203 0 3.585.016 4.85.071 1.17.055 1.805.249 2.227.415.562.217.96.477 1.382.896.419.42.679.819.896 1.381.164.422.36 1.057.413 2.227.057 1.266.07 1.646.07 4.85s-.015 3.584-.071 4.85c-.055 1.17-.249 1.805-.415 2.227-.217.562-.477.96-.896 1.382-.42.419-.819.679-1.381.896-.422.164-1.057.36-2.227.413-1.266.057-1.646.07-4.85.07s-3.584-.015-4.85-.071c-1.17-.055-1.805-.249-2.227-.415-.562-.217-.96-.477-1.382-.896-.419-.42-.679-.819-.896-1.381-.164-.422-.36-1.057-.413-2.227-.057-1.266-.07-1.646-.07-4.85s.016-3.584.071-4.85c.055-1.17.249-1.805.415-2.227.217-.562.477-.96.896-1.382.42-.419.819-.679 1.381-.896.422-.164 1.057-.36 2.227-.413 1.266-.057 1.646-.07 4.85-.07zM12 5.837a6.163 6.163 0 100 12.326 6.163 6.163 0 000-12.326zm0 10.166a4.003 4.003 0 110-8.006 4.003 4.003 0 010 8.006zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
            <span class="sr-only">Instagram</span>
          </a>
          
          <!-- WhatsApp -->
          <a href="https://wa.me/8801927041100" target="_blank" rel="noopener noreferrer" class="social-icon group">
            <svg class="w-5 h-5 transition-transform group-hover:scale-110" fill="currentColor" viewBox="0 0 24 24">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            <span class="sr-only">WhatsApp</span>
          </a>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
