name: Build Android APK

on:
  workflow_dispatch:  # Allows manual trigger from GitHub UI
  push:
    branches:
      - main
      - master
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android-apk.yml'

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android-app/android/gradlew

      - name: Build debug APK
        working-directory: android-app/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mkdir -p apk-output
          cp android-app/android/app/build/outputs/apk/debug/app-debug.apk apk-output/RamadanCast-v1.0-debug.apk
          ls -lh apk-output/

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RamadanCast-Android-APK
          path: apk-output/RamadanCast-v1.0-debug.apk
          retention-days: 30

      - name: Display APK info
        run: |
          echo "✅ APK built successfully!"
          echo "📦 APK Size: $(du -h apk-output/RamadanCast-v1.0-debug.apk | cut -f1)"
          echo "📱 Download the APK from the Actions artifacts"
